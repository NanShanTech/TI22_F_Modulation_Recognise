project:
  packs:
    - pack: ARM::CMSIS@^5.8.0
    - pack: Keil::STM32H7xx_DFP@^2.7.0
    - pack: ARM::CMSIS-NN@^4.0.0
    - pack: ARM::CMSIS-DSP@^1.10.1
  setups:
    - setup: Options for h743_hal
      processor:
        fpu: dp
      add-path:
        - ../Core/Inc
        - ../Drivers/STM32H7xx_HAL_Driver/Inc
        - ../Drivers/STM32H7xx_HAL_Driver/Inc/Legacy
        - ../Drivers/CMSIS/Device/ST/STM32H7xx/Include
        - ../Drivers/CMSIS/Include
        - ../Hardware
        - ../App
        - ../App/comm
        - ../App/dac
        - ../App/dds
        - ../App/fft
        - ../App/measure
        - ../App/task
        - ../App/utils
        - ../long_fft
      debug: "on"
      define:
        - USE_PWR_LDO_SUPPLY
        - USE_HAL_DRIVER
        - STM32H743xx
        - ARM_MATH_CM7
        - __FPU_PRESENT: "1"
        - __MICROLIB
      define-asm:
        - __MICROLIB
      misc:
        - C:
            - -std=c99
          C-CPP:
            - -fno-rtti
            - -funsigned-char
            - -fshort-enums
            - -fshort-wchar
            - -ffunction-sections
            - -Wno-packed
            - -Wno-missing-variable-declarations
            - -Wno-missing-prototypes
            - -Wno-missing-noreturn
            - -Wno-sign-conversion
            - -Wno-nonportable-include-path
            - -Wno-reserved-id-macro
            - -Wno-unused-macros
            - -Wno-documentation-unknown-command
            - -Wno-documentation
            - -Wno-license-management
            - -Wno-parentheses-equality
          CPP:
            - -xc++
            - -std=c++11
            - -fno-exceptions
          ASM:
            - -masm=auto
          Link:
            - --library_type=microlib
            - --map
            - --load_addr_map_info
            - --xref
            - --callgraph
            - --symbols
            - --info sizes
            - --info totals
            - --info unused
            - --info veneers
            - --strict
            - --summary_stderr
            - --info summarysizes
  linker:
    - script: h743_hal/h743_hal.sct
  groups:
    - group: Application/MDK-ARM
      files:
        - file: startup_stm32h743xx.s
          misc:
            - ASM:
                - -masm=auto
    - group: Application/User/Core
      files:
        - file: ../Core/Src/main.c
        - file: ../Core/Src/gpio.c
        - file: ../Core/Src/adc.c
        - file: ../Core/Src/dma.c
        - file: ../Core/Src/tim.c
        - file: ../Core/Src/usart.c
        - file: ../Core/Src/stm32h7xx_it.c
        - file: ../Core/Src/stm32h7xx_hal_msp.c
    - group: Drivers/STM32H7xx_HAL_Driver
      files:
        - file: ../Drivers/STM32H7xx_HAL_Driver/Src/stm32h7xx_hal_adc.c
        - file: ../Drivers/STM32H7xx_HAL_Driver/Src/stm32h7xx_hal_adc_ex.c
        - file: ../Drivers/STM32H7xx_HAL_Driver/Src/stm32h7xx_hal_rcc.c
        - file: ../Drivers/STM32H7xx_HAL_Driver/Src/stm32h7xx_hal_rcc_ex.c
        - file: ../Drivers/STM32H7xx_HAL_Driver/Src/stm32h7xx_hal_flash.c
        - file: ../Drivers/STM32H7xx_HAL_Driver/Src/stm32h7xx_hal_flash_ex.c
        - file: ../Drivers/STM32H7xx_HAL_Driver/Src/stm32h7xx_hal_gpio.c
        - file: ../Drivers/STM32H7xx_HAL_Driver/Src/stm32h7xx_hal_hsem.c
        - file: ../Drivers/STM32H7xx_HAL_Driver/Src/stm32h7xx_hal_dma.c
        - file: ../Drivers/STM32H7xx_HAL_Driver/Src/stm32h7xx_hal_dma_ex.c

        - file: ../Drivers/STM32H7xx_HAL_Driver/Src/stm32h7xx_hal_mdma.c
        - file: ../Drivers/STM32H7xx_HAL_Driver/Src/stm32h7xx_hal_pwr.c
        - file: ../Drivers/STM32H7xx_HAL_Driver/Src/stm32h7xx_hal_pwr_ex.c
        - file: ../Drivers/STM32H7xx_HAL_Driver/Src/stm32h7xx_hal_cortex.c
        - file: ../Drivers/STM32H7xx_HAL_Driver/Src/stm32h7xx_hal.c
        - file: ../Drivers/STM32H7xx_HAL_Driver/Src/stm32h7xx_hal_i2c.c
        - file: ../Drivers/STM32H7xx_HAL_Driver/Src/stm32h7xx_hal_i2c_ex.c
        - file: ../Drivers/STM32H7xx_HAL_Driver/Src/stm32h7xx_hal_exti.c
        - file: ../Drivers/STM32H7xx_HAL_Driver/Src/stm32h7xx_hal_tim.c
        - file: ../Drivers/STM32H7xx_HAL_Driver/Src/stm32h7xx_hal_tim_ex.c
        - file: ../Drivers/STM32H7xx_HAL_Driver/Src/stm32h7xx_hal_uart.c
        - file: ../Drivers/STM32H7xx_HAL_Driver/Src/stm32h7xx_hal_uart_ex.c
    - group: Drivers/CMSIS
      files:
        - file: ../Core/Src/system_stm32h7xx.c
    - group: APP
      files:
        - file: ../App/app_config.h
        - file: ../App/app_types.h
    - group: MyDrive
      files:
        - file: ../App/dds/ad9910.c
        - file: ../App/dds/ad9910.h
        - file: ../App/dds/ad9959.c
        - file: ../App/dds/ad9959.h
        - file: ../App/utils/delay.c
        - file: ../App/utils/delay.h
        - file: ../App/comm/serial.c
        - file: ../App/comm/serial.h
    - group: Task
      files:
        - file: ../App/measure/freq_measure.c
        - file: ../App/measure/freq_measure.h
        - file: ../App/task/adc_task.c
        - file: ../App/task/adc_task.h
        - file: ../App/task/scheduler.c
        - file: ../App/task/scheduler.h
        - file: ../App/task/tasks.c
        - file: ../App/task/tasks.h
    - group: DSP
      files:
        - file: ../App/dsp/dsp_filter.c
        - file: ../App/dsp/dsp_filter.h
        - file: ../App/dsp/dsp_adaptive.c
        - file: ../App/dsp/dsp_adaptive.h
        - file: ../App/dsp/dsp_analyze.c
        - file: ../App/dsp/dsp_analyze.h
    - group: fft
      files:
        - file: ../App/fft/spectrum_processing.h
        - file: ../App/fft/spectrum_processing.c
        - file: ../App/fft/estimaters.h
        - file: ../App/fft/estimaters.c
        - file: fft_helper.c
        - file: fft_helper.h
    - group: demodulation
      files:
        - file: ../App/demodulation/ddc.c
        - file: ../App/demodulation/ddc.h
        - file: ../App/demodulation/demodulation.c
        - file: ../App/demodulation/lpf_fir.h
        - file: ../App/demodulation/demodulation.h
        - file: ../App/demodulation/demodulation_app.c
        - file: ../App/demodulation/demodulation_app.h
  components:
    - component: ARM::CMSIS:CORE
    - component: CMSIS:DSP&Source
